name: Prune old release tags and releases

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  prune-release-history:
    runs-on: ubuntu-latest

    steps:
      - name: Keep only the latest 5 releases
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = 5;

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            if (releases.length <= keepCount) {
              core.info(`Only ${releases.length} release(s) found. Nothing to prune.`);
              return;
            }

            const toDelete = releases.slice(keepCount);

            core.info(`Keeping the newest ${keepCount} release(s).`);
            core.info(`Deleting ${toDelete.length} older release(s) and tags.`);

            for (const release of toDelete) {
              const tag = release.tag_name;

              if (!tag) {
                core.info(`Skipping release ${release.id} because it has no tag_name.`);
                continue;
              }

              core.info(`Deleting release: ${release.name ?? tag} (${tag})`);

              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });
              } catch (error) {
                core.warning(`Failed to delete release ${release.id}: ${error.message}`);
              }

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tag}`
                });
              } catch (error) {
                core.warning(`Failed to delete tag ${tag}: ${error.message}`);
              }
            }
name: Build and Publish Release

on:
  push:
    branches:
      - main # Triggers on every push to the main branch

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Java 25
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin' # Reliable open-source JDK distribution
          cache: 'maven' # Speeds up builds by caching dependencies

      # 2. Build the project using Maven
      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      # 3. Get the short commit SHA for the release name
      - name: Get short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 4. Create the Release and upload the compiled JAR
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: commit-${{ steps.vars.outputs.sha_short }}
          name: Development Build (${{ steps.vars.outputs.sha_short }})
          body: "Automated build for commit ${{ github.sha }}"
          prerelease: true
          # Attaches any jar found in the target folder to the GitHub release
          files: target/*.jar

name: Build and Publish Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # NEW STEP: Manually install your local JAR so Maven can find it during the build
      - name: Install Local Maven Dependencies
        run: |
          mvn install:install-file \
            -Dfile="libs/DynamicFloatingDamageFormatter-1.0.1.jar" \
            -DgroupId="irai.mod" \
            -DartifactId="dynamicfloatingdamageformatter" \
            -Dversion="1.0.1" \
            -Dpackaging=jar

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Get short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: commit-${{ steps.vars.outputs.sha_short }}
          name: Development Build (${{ steps.vars.outputs.sha_short }})
          body: "Automated build for commit ${{ github.sha }}"
          prerelease: true
          files: target/*.jar
